version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pet-trail-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pet_trail
      MYSQL_USER: pettrail
      MYSQL_PASSWORD: pettrail123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - pet-trail-network

  redis:
    image: redis:7-alpine
    container_name: pet-trail-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pet-trail-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pet-trail-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pet_trail?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: pettrail
      SPRING_DATASOURCE_PASSWORD: pettrail123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    networks:
      - pet-trail-network

  nginx:
    image: nginx:alpine
    container_name: pet-trail-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - pet-trail-network

volumes:
  mysql-data:
  redis-data:

networks:
  pet-trail-network:
    driver: bridge
