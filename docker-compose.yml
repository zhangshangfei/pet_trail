version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pet-trail-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pet_trail}
      MYSQL_USER: ${MYSQL_USER:-pettrail}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pettrail123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - pet-trail-network

  redis:
    image: redis:7-alpine
    container_name: pet-trail-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pet-trail-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pet-trail-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: pet_trail
      MYSQL_USERNAME: ${MYSQL_USER:-pettrail}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pettrail123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY}
      TENCENT_COS_BUCKET_NAME: ${TENCENT_COS_BUCKET_NAME}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-ap-shanghai}
      JWT_SECRET: ${JWT_SECRET}
      WECHAT_MINIAPP_APP_ID: ${WECHAT_MINIAPP_APP_ID}
      WECHAT_MINIAPP_APP_SECRET: ${WECHAT_MINIAPP_APP_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    networks:
      - pet-trail-network

  nginx:
    image: nginx:alpine
    container_name: pet-trail-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - pet-trail-network

volumes:
  mysql-data:
  redis-data:

networks:
  pet-trail-network:
    driver: bridge
