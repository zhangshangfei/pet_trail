server:
  port: 8080

spring:
  application:
    name: pet-trail-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:pet_trail}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123456}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 5

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  rabbitmq:
    enabled: ${RABBITMQ_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

tencent:
  cos:
    bucket-name: ${TENCENT_COS_BUCKET_NAME:}
    region: ${TENCENT_COS_REGION:ap-shanghai}
    secret-id: ${TENCENT_COS_SECRET_ID:}
    secret-key: ${TENCENT_COS_SECRET_KEY:}

jwt:
  secret: ${JWT_SECRET:pet-trail-default-jwt-secret-key-for-development-only}
  expiration: 604800

wechat:
  miniapp:
    app-id: ${WECHAT_MINIAPP_APP_ID:}
    app-secret: ${WECHAT_MINIAPP_APP_SECRET:}
  pay:
    mch-id: ${WECHAT_PAY_MCH_ID:}
    api-key: ${WECHAT_PAY_API_KEY:}
    notify-url: ${WECHAT_PAY_NOTIFY_URL:}

ai:
  enabled: ${AI_ENABLED:true}
  api-key: ${AI_API_KEY:}
  base-url: ${AI_BASE_URL:https://openrouter.ai/api/v1}
  model: ${AI_MODEL:openrouter/free}
  glm:
    enabled: ${AI_GLM_ENABLED:true}
    api-key: ${AI_GLM_API_KEY:}
    base-url: ${AI_GLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    model: ${AI_GLM_MODEL:glm-4.7-flash}

logging:
  level:
    com.pettrail.pettrailbackend: debug
    com.pettrail.pettrailbackend.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
