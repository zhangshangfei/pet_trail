user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # 1. 修正 Upstream：指向你的后端容器名称或服务地址
    # 假设你的后端容器在同一个 docker network 中叫 'backend'，且监听 8080
    upstream backend {
        server backend:8080;
    }

    # 2. 新增：HTTP 强制跳转 HTTPS
    server {
        listen 80;
        # 同时监听带 www 和不带 www 的域名
        server_name aipetfamily.cn www.aipetfamily.cn;
        return 301 https://$server_name$request_uri;
    }

    # 3. 启用并配置 HTTPS Server
    server {
        listen 443 ssl http2;
        # 同时监听带 www 和不带 www
        server_name aipetfamily.cn www.aipetfamily.cn;

        # --- SSL 证书配置 ---
        # 路径必须对应你挂载到容器内的路径
        ssl_certificate      /etc/nginx/ssl/aipetfamily.cn_bundle.pem;
        ssl_certificate_key  /etc/nginx/ssl/aipetfamily.cn.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;
        # --------------------

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API 反向代理
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 前端静态文件
        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            try_files $uri $uri/ /admin/index.html;
            index index.html;
        }

        location /admin {
            return 301 /admin/;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            index index.html;
        }
    }
}